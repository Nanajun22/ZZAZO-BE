name: "[CI] 빌드 및 도커 이미지 푸시"

on:
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-push:
    if: github.repository == 'Leets-Official/ZZAZO-BE'
    runs-on: ubuntu-latest

    steps:
      - name: 소스 코드 체크아웃
        uses: actions/checkout@v4

      - name: JDK 21 설치
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Gradle 빌드 (테스트 제외)
        run: |
          chmod +x ./gradlew
          ./gradlew clean bootJar -x test --no-daemon